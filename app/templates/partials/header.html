<div id="kt_app_header" class="app-header"
     data-kt-sticky="true"
     data-kt-sticky-activate="{default: true, lg: true}"
     data-kt-sticky-name="app-header-minimize"
     data-kt-sticky-offset="{default: '200px', lg: '0'}"
     data-kt-sticky-animation="false">

    <!--begin::Header container-->
    <div class="app-container container-fluid d-flex align-items-stretch justify-content-between"
         id="kt_app_header_container">

        <!--begin::Sidebar mobile toggle-->
        <div class="d-flex align-items-center d-lg-none ms-n3 me-1 me-md-2"
             title="Show sidebar menu">
            <div class="btn btn-icon btn-active-color-primary w-35px h-35px"
                 id="kt_app_sidebar_mobile_toggle">
                <i class="ki-outline ki-abstract-14 fs-2 fs-md-1"></i>
            </div>
        </div>
        <!--end::Sidebar mobile toggle-->

        <!--begin::Header wrapper-->
        <div class="d-flex align-items-stretch justify-content-between flex-lg-grow-1"
             id="kt_app_header_wrapper">

            <!--begin::Menu wrapper-->
            <div class="app-header-menu app-header-mobile-drawer align-items-stretch pt-4"
                 data-kt-drawer="true"
                 data-kt-drawer-name="app-header-menu"
                 data-kt-drawer-activate="{default: true, lg: false}"
                 data-kt-drawer-overlay="true"
                 data-kt-drawer-width="250px"
                 data-kt-drawer-direction="end"
                 data-kt-drawer-toggle="#kt_app_header_menu_toggle"
                 data-kt-swapper="true"
                 data-kt-swapper-mode="{default: 'append', lg: 'prepend'}"
                 data-kt-swapper-parent="{default: '#kt_app_body', lg: '#kt_app_header_wrapper'}">

                <h1 class="d-flex align-items-center gap-2 app_name_text">
                    <img alt="Logo"
                         src="{{ url_for('static', filename='/media/logos/logo-essalud-v2.png') }}"
                         class="h-40px">
                    <span class="pt-5">
                        &nbsp;&nbsp;|&nbsp;&nbsp;
                        <b>SAMEC</b> - Sistema de Acreditación y Mejora Continua
                    </span>
                </h1>
            </div>
            <!--end::Menu wrapper-->



            <!--begin::Navbar-->
            <div class="app-navbar flex-shrink-0">
                <!--begin::IPRESS info-->
                <div class="d-flex flex-column align-items-end me-5 pt-5">
                    <span class="app_name_subtext">
                        {{ current_user.red_nombre }}<br>
                        {{ current_user.ipress_nombre }}&nbsp;&nbsp;-&nbsp;&nbsp;{{ current_user.ipress_nivel }}
                    </span>
                </div>
                <!--end::IPRESS info-->

                <!--begin::Chat-->
                <div class="app-navbar-item ms-1 ms-md-4">
                    <div class="btn btn-icon btn-custom btn-icon-muted btn-active-light btn-active-color-primary
                                w-35px h-35px position-relative"
                         id="kt_drawer_chat_toggle">
                        <i class="ki-outline ki-message-text-2 fs-2"></i>
                        <span class="bullet bullet-dot bg-success h-6px w-6px
                                     position-absolute translate-middle top-0 start-50 animation-blink"></span>
                    </div>
                </div>
                <!--end::Chat-->

                <!--begin::User menu-->
                <div class="app-navbar-item ms-1 ms-md-4"
                     id="kt_header_user_menu_toggle">

                    <!-- Avatar -->
                    <div class="cursor-pointer symbol symbol-35px"
                         data-kt-menu-trigger="{default: 'click'}"
                         data-kt-menu-attach="parent"
                         data-kt-menu-placement="bottom-end">
                        <img src="{{ url_for('static', filename='/media/avatars/300-3.jpg') }}"
                             class="rounded-3"
                             alt="user" />
                    </div>

                    <!-- Dropdown -->
                    <div class="menu menu-sub menu-sub-dropdown menu-column menu-rounded
                                menu-gray-800 menu-state-bg menu-state-primary fw-semibold
                                py-2 fs-7 w-150px"
                         data-kt-menu="true"
                         data-kt-menu-flip="bottom">

                        <div class="menu-item px-3">
                            <a href="#"
                               class="menu-link px-3 py-1"
                               data-bs-toggle="modal"
                               data-bs-target="#modalPerfil">
                                Ver Perfil
                            </a>
                        </div>

                        <div class="separator my-2"></div>

                        <div class="menu-item px-3">
                            <a href="{{ url_for('auth.logout') }}"
                               class="menu-link px-3 py-1">
                                Cerrar sesión
                            </a>
                        </div>

                    </div>
                    <!--end::Dropdown-->
                </div>
                <!--end::User menu-->

                <!--begin::Header menu toggle-->
                <div class="app-navbar-item d-lg-none ms-2 me-n2"
                     title="Show header menu">
                    <div class="btn btn-flex btn-icon btn-active-color-primary
                                w-30px h-30px"
                         id="kt_app_header_menu_toggle">
                        <i class="ki-outline ki-element-4 fs-1"></i>
                    </div>
                </div>
                <!--end::Header menu toggle-->

            </div>
            <!--end::Navbar-->
        </div>
        <!--end::Header wrapper-->
    </div>
    <!--end::Header container-->
</div>
<div class="modal fade" id="modalPerfil" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
        <div class="modal-content">

            <!-- HEADER -->
            <div class="modal-header">
                <h5 class="modal-title">Perfil de Usuario</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <!-- BODY -->
            <form id="formPerfil">
                <div class="modal-body">
                    <div class="row g-4">

                        <!-- FILA 1 -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Nombre de Usuario</label>
                            <input type="text" class="form-control form-control-solid"
                                   value="{{ current_user.username }}" disabled>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Correo electrónico</label>
                            <input type="email" class="form-control form-control-solid"
                                   value="{{ current_user.correo }}" disabled>
                        </div>

                        <!-- FILA 2 -->
                        <div class="col-md-12">
                            <label class="form-label fw-semibold">Rol</label>
                            <input type="text"
                                class="form-control form-control-solid"
                                value="{{ current_user_rol }}"
                                disabled>
                        </div>


                        <!-- FILA 3 -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Red</label>
                            <input type="text" class="form-control form-control-solid"
                                   value="{{ current_user.red.nombre_red if current_user.red else '' }}"
                                   disabled>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">IPRESS</label>
                            <input type="text" class="form-control form-control-solid"
                                   value="{{ current_user.ipress.nombre_ipress if current_user.ipress else '' }}"
                                   disabled>
                        </div>

                        <!-- FILA 4 (PASSWORD) -->
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Password Actual</label>
                            <input type="password" name="password_actual"
                                   class="form-control" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Nuevo Password</label>
                            <input type="password" name="nuevo_password"
                                   class="form-control" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Confirmar Password</label>
                            <input type="password" name="confirmar_password"
                                   class="form-control" required>
                        </div>

                    </div>

                    <!-- ALERTAS -->
                    <div class="alert alert-danger mt-4 d-none" id="perfilError"></div>
                    <div class="alert alert-success mt-4 d-none" id="perfilSuccess"></div>
                </div>

                <!-- FOOTER -->
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        Grabar
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>

<script>
document.getElementById('formPerfil').addEventListener('submit', function (e) {
    e.preventDefault();

    const form = this;
    const data = new FormData(form);

    fetch("{{ url_for('auth.cambiar_password_perfil') }}", {
        method: "POST",
        body: data
    })
    .then(res => res.json())
    .then(resp => {

        const errorBox = document.getElementById('perfilError');
        const successBox = document.getElementById('perfilSuccess');

        errorBox.classList.add('d-none');
        successBox.classList.add('d-none');

        if (resp.success) {
            successBox.innerText = resp.message;
            successBox.classList.remove('d-none');
            form.reset();
        } else {
            errorBox.innerText = resp.message;
            errorBox.classList.remove('d-none');
        }
    })
    .catch(() => {
        const errorBox = document.getElementById('perfilError');
        errorBox.innerText = "Error inesperado al actualizar password";
        errorBox.classList.remove('d-none');
    });
});
</script>
