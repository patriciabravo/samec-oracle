{% extends "layout.html" %}

{% block styles %}

{% endblock %}

{% block title %}Inicio{% endblock %}

{% block content %}
<div id="mi_calendario" class="card card-flush">
    <div class="card-body">
        <div id="calendar"></div>
    </div>
</div>

{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='plugins/custom/fullcalendar/fullcalendar.bundle.js') }}"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
    var calendarEl = document.getElementById("calendar");

    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "dayGridMonth",
        headerToolbar: {
            left: "prev,next today",
            center: "title",
            right: "dayGridMonth,timeGridWeek,timeGridDay"
        },
        events: [
            {
                title: "Evento de prueba",
                start: "2025-09-23",
                end: "2025-09-24"
            },
            {
                title: "Reunión",
                start: "2025-09-26T10:30:00",
                end: "2025-09-26T12:30:00"
            }
        ]
    });

    calendar.render();
});
</script>
{% endblock %}
