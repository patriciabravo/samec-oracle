<!DOCTYPE html>
<html lang="en">
	<!--begin::Head-->
	<head>
        <base href="../"/>
		<title>Logueo Sistema</title>
		<meta charset="utf-8" />
		<!--begin::Fonts(mandatory for all pages)-->
		<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700" />
		<!--end::Fonts-->
		<!--begin::Vendor Stylesheets(used for this page only)-->
		<link href="{{ url_for('static', filename='plugins/custom/fullcalendar/fullcalendar.bundle.css') }}" rel="stylesheet">
		<link href="{{ url_for('static', filename='plugins/custom/datatables/datatables.bundle.css') }}" rel="stylesheet">
		<!--end::Vendor Stylesheets-->
		<!--begin::Global Stylesheets Bundle(mandatory for all pages)-->
		<link href="{{ url_for('static', filename='plugins/global/plugins.bundle.css') }}" rel="stylesheet">
		<link href="{{ url_for('static', filename='css/style.bundle.css') }}" rel="stylesheet">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.9.3/min/dropzone.min.css" />
		<link href="{{ url_for('auth.static', filename='css/dropzone-custom.css') }}" rel="stylesheet" >
		<link href="{{ url_for('auth.static', filename='css/login-custom.css') }}" rel="stylesheet">
		<!--end::Global Stylesheets Bundle-->
		<script>
            // Frame-busting to prevent site from being loaded within a frame without permission (click-jacking) if (window.top != window.self) { window.top.location.replace(window.self.location.href); }
		</script>

	</head>
	<!--end::Head-->
	<!--begin::Body-->
	<body id="kt_body" class="app-blank">
		<!--begin::Theme mode setup on page load-->
		<script>var defaultThemeMode = "light"; var themeMode; if ( document.documentElement ) { if ( document.documentElement.hasAttribute("data-bs-theme-mode")) { themeMode = document.documentElement.getAttribute("data-bs-theme-mode"); } else { if ( localStorage.getItem("data-bs-theme") !== null ) { themeMode = localStorage.getItem("data-bs-theme"); } else { themeMode = defaultThemeMode; } } if (themeMode === "system") { themeMode = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"; } document.documentElement.setAttribute("data-bs-theme", themeMode); }</script>
		<!--end::Theme mode setup on page load-->
		<!--begin::Root-->
		<div class="d-flex flex-column flex-root" id="kt_app_root">
			<!--begin::Authentication - Sign-up -->
			<div class="d-flex flex-column flex-lg-row flex-column-fluid">
				<!--begin::Body-->
				<div class="d-flex flex-column flex-lg-row-fluid w-lg-50 p-10 order-2 order-lg-1">
						<div class="text-start">
  							<img src="{{ url_for('auth.static', filename='media/logo-essalud-v2.png') }}"  alt="Logo essalud" width="250">
						</div>
					<!--begin::Form-->
					<div class="d-flex flex-center flex-column flex-lg-row-fluid">
						<!--begin::Wrapper-->
						<div class="w-lg-700px p-10">
							<!--begin::Form-->
							<form class="form w-100" novalidate="novalidate" id="kt_sign_up_form" data-kt-redirect-url="{{ url_for('auth.guardausuario') }}"  action="{{ url_for('auth.guardausuario') }}" method="POST" enctype="multipart/form-data" >
								<!--begin::Heading-->
								<div class="text-center mb-11">
									<!--begin::LogoSistema-->
									<img src="{{ url_for('static', filename='media/icons/menu_icons/hospital-chart-style-s-svgrepo-com.svg') }}" alt="Logo Samec" width="150" height="150">
									<!--end::LogoSistema=-->
									<!--begin::Title-->
									<h1>SAMEC</h1>
									<h2>Sistema Acreditación y Mejora Continua</h2>
									<!--end::Title-->
								</div>
								<!--begin::Heading-->
								<div class="fv-row mb-7">
									<div class="row">
										<div class="col-md-6">
											<select id="tipo_doc" name="tipo_doc" class="form-select" style="width:100%">												
												<option></option>
        									</select>
										</div>
										<div class="col-md-6">
											<input type="text" class="form-control bg-transparent"  name="nro_documento" placeholder="No. de documento" />
										</div>
									</div>
								</div>
								<div class="fv-row mb-7">
									<div class="row">
										<div class="col-md-12">
											<input type="text" class="form-control bg-transparent"  name="nombres" placeholder="Nombres" />
										</div>
									</div>
								</div>
								<div class="fv-row mb-7">
									<div class="row">
										<div class="col-md-6">
											<input type="text" class="form-control bg-transparent"  name="apellido_paterno" placeholder="Apellido Paterno" />
										</div>
										<div class="col-md-6">
											<input type="text" class="form-control bg-transparent"  name="apellido_materno" placeholder="Apellido Materno" />
										</div>
									</div>
								</div>
								<div class="fv-row mb-7">
									<div class="row">
										<div class="col-md-6">
											<select id="redes" name="redes" class="form-select" style="width:100%">
												<option></option>
											</select>
										</div>
										<div class="col-md-6">
											<select id="ipress" name="ipress" class="form-select" style="width:100%">
												<option></option>
											</select>
										</div>
									</div>								
								</div>							
								<!--begin::Input group=-->
								<div class="fv-row mb-8">
									<!--begin::Email-->
									<input type="text" placeholder="Correo" name="correo" autocomplete="off" class="form-control bg-transparent" />
									<!--end::Email-->
								</div>
								<!--begin::Input group-->
								<div class="fv-row mb-8" data-kt-password-meter="true">
									<!--begin::Wrapper-->
									<div class="mb-1">
										<!--begin::Input wrapper-->
										<div class="position-relative mb-3">
											<input class="form-control bg-transparent" type="password" placeholder="Contraseña" name="password" autocomplete="off" />
											<span class="btn btn-sm btn-icon position-absolute translate-middle top-50 end-0 me-n2" data-kt-password-meter-control="visibility">
												<i class="ki-duotone ki-eye-slash fs-2"></i>
												<i class="ki-duotone ki-eye fs-2 d-none"></i>
											</span>
										</div>
										<!--end::Input wrapper-->
										<!--begin::Meter-->
										<div class="d-flex align-items-center mb-3" data-kt-password-meter-control="highlight">
											<div class="flex-grow-1 bg-secondary bg-active-success rounded h-5px me-2"></div>
											<div class="flex-grow-1 bg-secondary bg-active-success rounded h-5px me-2"></div>
											<div class="flex-grow-1 bg-secondary bg-active-success rounded h-5px me-2"></div>
											<div class="flex-grow-1 bg-secondary bg-active-success rounded h-5px"></div>
										</div>
										<!--end::Meter-->
									</div>
									<!--end::Wrapper-->
									<!--begin::Hint-->
									<div class="text-muted">Use 8 o más caracteres con una combinación de letras, números y símbolos.</div>
									<!--end::Hint-->
								</div>
								<div class="fv-row mb-8">
									<!--begin::Repeat Password-->
									<input placeholder="Repetir Contraseña" name="confirm-password" type="password" autocomplete="off" class="form-control bg-transparent" />
									<!--end::Repeat Password-->
								</div>
								<!--end::Input group=-->
								<input type="hidden" id="filesToInsertDB" name="filesToInsertDB">
								<div class="dropzone" id="myDropzone">
								</div>
								<!--begin::Accept-->
								<div class="fv-row mb-8 pt-5">
									<label class="form-check form-check-inline">
										<input class="form-check-input" type="checkbox" name="toc" value="1" />
										<span class="form-check-label fw-semibold text-gray-700 fs-base ms-1">Acepto los
										<a href="#" class="ms-1 link-primary">Terminos</a></span>
									</label>
								</div>
								<!--end::Accept-->
								<div id="register-error" class="text-danger mb-3"></div>
								<!--begin::Submit button-->
								<div class="d-grid mb-10">
									<button type="submit" id="kt_sign_up_submit" class="btn btn-primary">
										<!--begin::Indicator label-->
										<span class="indicator-label">Registrarse</span>
										<!--end::Indicator label-->
										<!--begin::Indicator progress-->
										<span class="indicator-progress">Please wait...
										<span class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
										<!--end::Indicator progress-->
									</button>
								</div>
								<!--end::Submit button-->
								<!--begin::Sign up-->
								<div class="text-gray-500 text-center fw-semibold fs-6">Ya tiene una cuenta?
								<a href="./auth/logueo" class="btn btn-secondary">Ingresar</a>
								</div>
								<!--end::Sign up-->
							</form>
							<!--end::Form-->
						</div>
						<!--end::Wrapper-->
					</div>
					<!--end::Form-->
					<!--begin::Footer-->
					<div class="w-lg-500px d-flex flex-stack px-10 mx-auto">
						<p class="text-muted">
							© 2025, Gerencia de Acreditación y Mejora Continua - GAMCC
						</p>
					</div>
					<!--end::Footer-->
				</div>
				<!--end::Body-->
				<!--begin::Aside-->
				<div class="d-flex flex-lg-row-fluid w-lg-50 bgi-size-cover bgi-position-center order-1 order-lg-2" style="background-image: url('{{ url_for('auth.static', filename='media/register_pic_v2.jpg') }}')" >						
				</div>
				<!--end::Aside-->
			</div>
			<!--end::Authentication - Sign-up-->
		</div>
		<!--end::Root-->
		<!--begin::Javascript-->
		<script>var hostUrl = "/";</script>
		<!--begin::Global Javascript Bundle(mandatory for all pages)-->
		<script src="{{ url_for('static', filename='plugins/global/plugins.bundle.js') }}"></script>
		<script src="{{ url_for('static', filename='js/scripts.bundle.js') }}"></script>
		<script src="https://unpkg.com/dropzone@5/dist/min/dropzone.min.js"></script>
		<!--end::Global Javascript Bundle-->
		<!--begin::Custom Javascript(used for this page only)-->
		<script>
		const URL_GET_TIPO_DOCUMENTO = "{{ url_for('auth.tipos_documento') }}";
		const URL_GET_REDES = "{{ url_for('auth.get_redes_essalud') }}";
		const URL_GET_IPRESS = "{{ url_for('auth.get_ipress_essalud',id_red=0) }}";
		</script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.9.3/min/dropzone.min.js"></script>
		<script src="{{ url_for('auth.static', filename='js/sign-up/general.js') }}"></script>		
		<script src="{{ url_for('auth.static', filename='js/sign-up/register.js') }}"></script>
		<!--end::Custom Javascript-->
		<script>
		RegisterEvent.init();
		</script>
	</body>
	<!--end::Body-->
</html>
