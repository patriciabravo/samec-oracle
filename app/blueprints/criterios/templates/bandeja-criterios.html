{% extends "layout.html" %}

{% block content %}

<div class="card">
    <div class="card-header card-subtitle-header py-6">
        Lista de Criterios
    </div>

    <div class="card-body">
        <table id="tablaCriterios" class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>CODIGO</th>
                    <th>NOMBRE CRITERIO</th>
                    <th>TIPO CRITERIO</th>
                    <th>PROCESO INSTITUCIONAL</th>
                    <th>APLICA ESSALUD</th>
                    <th></th>
                </tr>
            </thead>
        </table>

    </div>
</div>


<div class="modal fade" id="Modal_EditarCriterio" tabindex="-1" aria-labelledby="Modal_EditarCriterio" aria-hidden="true" style="display: none;">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
    <form id="form_edit_criterio" class="form" action="/" method="POST">    
      <div class="modal-header">
        <h5 class="modal-title">Editar Criterio</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" name="id_criterio" id="id_criterio" value="">
        <div class="row">
            <div class="col-md-2 mb-3">
                <label for="codigo_criterio" class="form-label">Código Criterio</label>
                <input type="text" class="form-control form-control-sm" id="codigo_criterio" name="codigo_criterio" required>
            </div>
            <div class="col-md-3 mb-3">
                <label for="sel_tipo_criterio" class="form-label">Tipo Criterio</label>
                <select class="form-select form-select-sm select2" id="sel_tipo_criterio" name="sel_tipo_criterio">
                    <option value="">Seleccione</option>
                    <option value="Estructura">Estructura</option>
                    <option value="Proceso">Proceso</option>
                    <option value="Resultado">Resultado</option>
                </select>
            </div>
            <div class="col-md-7 mb-3">
                <label for="sel_procesoinstitucional" class="form-label">Proceso Institucional</label>
                <select class="form-select form-select-sm" id="sel_procesoinstitucional" name="sel_procesoinstitucional">
                    <option value="">Seleccione</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12 mb-3">
                <label class="form-label">Nombre Criterio</label>
                <textarea class="form-control" id="nombre_criterio" name="nombre_criterio" required></textarea>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 mb-3">
                <label class="form-label">Puntaje 0</label>
                <textarea class="form-control" id="puntaje_0" name="puntaje_0" required></textarea>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12 mb-3">
                <label class="form-label">Puntaje 1</label>
                <textarea class="form-control" id="puntaje_1" name="puntaje_1" required></textarea>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12 mb-3">
                <label class="form-label">Puntaje 2</label>
                <textarea class="form-control" id="puntaje_2" name="puntaje_2" required></textarea>
            </div>
        </div>
        <div class="row">
            <div class="col-md-3 mb-3">
                <label for="sel_nivel_i_1" class="form-label">Nivel I-1</label>
                <select class="form-select form-select-sm select2" id="sel_nivel_i_1" name="sel_nivel_i_1">
                    <option value="">...</option>
                    <option value="1">SI</option>
                    <option value="0">NO</option>
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label for="sel_nivel_i_2" class="form-label">Nivel I-2</label>
                <select class="form-select form-select-sm select2" id="sel_nivel_i_2" name="sel_nivel_i_2">
                    <option value="">...</option>
                    <option value="1">SI</option>
                    <option value="0">NO</option>
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label for="sel_nivel_i_3" class="form-label">Nivel I-3</label>
                <select class="form-select form-select-sm select2" id="sel_nivel_i_3" name="sel_nivel_i_3">
                    <option value="">...</option>
                    <option value="1">SI</option>
                    <option value="0">NO</option>
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label for="sel_nivel_i_4" class="form-label">Nivel I-4</label>
                <select class="form-select form-select-sm select2" id="sel_nivel_i_4" name="sel_nivel_i_4">
                    <option value="">...</option>
                    <option value="1">SI</option>
                    <option value="0">NO</option>
                </select>
            </div>


        </div>
        <div class="row">
            <div class="col-md-3 mb-3">
                <label class="form-label">Nivel II-1</label>
                <select class="form-select form-select-sm select2" id="sel_nivel_ii_1" name="sel_nivel_ii_1">
                    <option value="">...</option>
                    <option value="1">SI</option>
                    <option value="0">NO</option>
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">Nivel II-2</label>
                <select class="form-select form-select-sm select2" id="sel_nivel_ii_2" name="sel_nivel_ii_2">
                    <option value="">...</option>
                    <option value="1">SI</option>
                    <option value="0">NO</option>
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">Nivel III-1</label>
                <select class="form-select form-select-sm select2" id="sel_nivel_iii_1" name="sel_nivel_iii_1">
                    <option value="">...</option>
                    <option value="1">SI</option>
                    <option value="0">NO</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Aplica Essalud</label>
                <select class="form-select form-select-sm select2" id="sel_aplica_essalud" name="sel_aplica_essalud">
                    <option value="">Seleccione</option>
                    <option value="1">SI</option>
                    <option value="0">NO</option>
                </select>
            </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-back-gris" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" id="btn_guarda_criterio"  class="btn btn-back-azul">Guardar</button>
      </div>
    </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('criterios.static', filename='js/administrarcriterios.js') }}"></script>
<script>
    CriteriosEvent.init();
</script>
{% endblock %}
