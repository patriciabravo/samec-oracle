{% extends "layout.html" %}
<!--<link href="{{ url_for('static', filename='plugins/global/plugins.bundle.css') }}" rel="stylesheet">
<link href="{{ url_for('static', filename='css/style.bundle.css') }}" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.9.3/min/dropzone.min.css" />-->
{% block content %}
<div class="card">
    <div class="card-header py-4">
        <h4>{{nombre_criterio}}</h4>
    </div>

    <div class="card-body">
        <button class="btn btn-back-azul btn-add-condicion" id="btn-nueva-condicion" data-bs-toggle="modal" data-bs-target="#AddCondicion" data-idcondicion="0" data-tipo="nuevo" >
                <i class="bi bi-person-plus fs-3 text-white"></i> Agregar Condición
        </button>
        <table id="tablaCondiciones" class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>CONDICION</th>
                    <th>PUNTAJE</th>
                    <th>TECNICA</th>
                    <th>NOMBRE FUENTE</th>
                    <th>ACCION</th>
                </tr>
            </thead>
        </table>

    </div>
</div>

<div class="modal fade modal-add-condicion" id="AddCondicion" tabindex="-1" aria-labelledby="AddCondicion" >
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
    <form id="form_nueva_condicion" class="form" action="{{ url_for('acredita.grabarcondicion') }}" method="POST">     
      <div class="modal-header">
        <h5 class="modal-title" >Agregar Condición a Criterio</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
            <div class="row g-4 p-2">
                <div class="col-md-12 fv-row">
                    <input type="hidden" name="id_criterio" id="id_criterio" value="{{id_criterio}}">
                    <input type="hidden" name="id_condicion" id="id_condicion" value="{{id_condicion}}">
                    <label for="nombre_condicion" class="form-label">Nombre de Condición</label>
                    <input type="text" class="form-control form-control-sm" id="nombre_condicion" name="nombre_condicion">
                </div>                
            </div>
            <div class="row g-4 p-2">
                <div class="col-md-12 fv-row">
                    <label for="puntaje_condicion" class="form-label">Puntaje Condición</label>
                    <select class="form-select form-select-sm" id="select_puntaje" name="select_puntaje">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                    </select>
                </div>                
            </div>
            <div class="row g-4 p-2">
                <div class="col-md-12 fv-row">
                    <label for="tecnica" class="form-label">Tecnica de Evaluación</label>
                    <select class="form-select form-select-sm" id="select_tecnica" name="select_tecnica">
                        <option value="">Selecciona tecnica</option>
                    </select>
                </div>                
            </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-back-gris" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" id="btn_guarda_condicion"  class="btn btn-back-azul">Guardar</button>
      </div>
    </form>
    </div>
  </div>
</div>

<div class="modal fade" id="AdmFuentes" tabindex="-1" aria-labelledby="AdmFuentes" >
  <div class="modal-dialog modal-lg">
    <div class="modal-content">      
      <div class="modal-header">
        <h5 class="modal-title" id="editarModalLabel">Administrar Fuentes</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>      
      <div class="modal-body">
        <form id="form_update_fuentes" class="form" action="" method="POST">     
          <input type="hidden" name="id_condicion" id="id_condicion" value="">
           <!--<div class="row">
            <div class="col-md-12">
            <input type="hidden" name="id_condicion" value="{{id_condicion}}">
                <label>Nombre de la fuente</label>
                <input type="text" name="fuente" class="form-control" required>
            </div>
            </div>
            <button id="btnAgregarDropzone" class="btn btn-primary mt-3">
                Agregar otro Dropzone
            </button>
            <div class="row">
                <div class="col-md-6" id="contenedorDropzones" >
                </div>
            </div>-->
          <table class="table table-bordered" id="tablaFuentes">
            <thead>
              <tr>
                <th>Nombre Fuente</th>
                <th>Link Fuente</th>
                <th style="width: 50px;"><button type="button" class="btn btn-sm btn-primary btnAgregarFila">+</button></th>
              </tr>
            </thead>
            <tbody>            
            </tbody>
          </table>
        
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-back-gris" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" id="btn_guarda_fuentes"  class="btn btn-back-azul">Guardar</button>
      </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
	<!--<script src="{{ url_for('static', filename='js/scripts.bundle.js') }}"></script>
		<script src="https://unpkg.com/dropzone@5/dist/min/dropzone.min.js"></script>

</script>
{% endblock %}
