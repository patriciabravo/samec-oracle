{% extends "layout.html" %}

{% block content %}

<div class="card">
    <div class="card-header py-4">
        <h4>Lista de Redes</h4>
    </div>

    <div class="card-body">
        <table id="tablaRedes" class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>CODIGO RED</th>
                    <th>NOMBRE</th>
                    <th>MACRORREGION</th>
                    <th></th>
                </tr>
            </thead>
        </table>

    </div>
</div>

<div class="modal fade" id="Modal_EditarRed" tabindex="-1" aria-labelledby="Modal_EditarRed" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
    <form id="form_nueva_red" class="form" action="" method="POST">    
      <div class="modal-header">
        <h5 class="modal-title" id="editarModalLabel">Editar Red</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" name="id_red" id="id_red" value="">
        <div class="row g-4 p-2">
            <div class="col-md-12 fv-row">
              <label for="nombre_red" class="form-label">Nombre Red</label>
              <input type="text" class="form-control form-control-sm" id="nombre_red" name="nombre_red">
            </div>
        </div>
        <div class="row g-4 p-2">
            <div class="col-md-12 fv-row">
              <label for="nombre_macrorregion" class="form-label">Macrorregion</label>
              <select class="form-select form-select-sm" id="sel_macrorregion" name="sel_macrorregion">
                <option value="">Seleccione Macrorregion</option>
              </select>
            </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-back-gris" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" id="btn_guarda_red"  class="btn btn-back-azul">Guardar</button>
      </div>
    </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('redes.static', filename='js/event.js') }}"></script>
<script>
    RedesEvent.init();
</script>
{% endblock %}
