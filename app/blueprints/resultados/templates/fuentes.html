{% extends "layout.html" %}
{% block content %}
<div class="card">
    <div class="card-header py-4">
        <span class="titulo_nivel_2">Busqueda de Autoevaluación por IPRESS</span>
    </div>
    <div class="card-body">
        {% if rol_id == 1 or rol_id == 3  %}
                <div class="alert">
                    <div class="row">
                        <div class="col-md-3">
                            <label for="filtroRed" class="form-label">
                                RED
                            </label>
                            <select id="filtroRed" class="form-select">
                                <option value=""></option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="filtroIpress" class="form-label">
                                IPRESS
                            </label>
                            <select id="filtroIpress" class="form-select">
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="filtroMacroproceso" class="form-label">
                                Macroproceso
                            </label>
                            <select id="filtroMacroproceso" class="form-select">
                            </select>
                        </div>
                        <div class="col-md-1 d-flex align-items-end">
                            <button id="btnBuscar" class="btn btn-primary w-100">
                                Filtrar
                            </button>
                        </div>

                    </div>
                </div>
        {% endif %}

        {% if rol_id ==2  %}
                <div class="alert">
                    <div class="row">
                        <div class="col-md-6 d-flex align-items-end">
                        <input type="text" id="miBuscador" placeholder="Buscar en los resultados ..." class="form-control">
                        </div>
                    </div>
                </div>
        {% endif %}

        <table id="tablaAutoevaluacion" class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th colspan="8" class="text-end fs-4">
                        Porcentaje Obtenido 
                        <span id="muestra_porcentaje" class="fw-bold">0 %</span>
                    </th>
                </tr>
                <tr>
                    
                    <th>Condición</th>
                    <th>Técnica</th>
                    <th>Proceso</th>
                    <th>Fuente</th>
                    <th>Evidencia</th>
                </tr>
            </thead>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('resultados.static', filename='js/general.js') }}"></script>
<script>
    const rolPrincipal = {{ rol_id }};
    const IdRed = {{ current_user.id_red | tojson  }};
    const IdIpress = {{ current_user.id_ipress | tojson }};
    ResultadosFuenteEvent.init();
</script>
{% endblock %}
