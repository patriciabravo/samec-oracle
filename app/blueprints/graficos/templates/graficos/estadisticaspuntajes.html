{% block content %}
<div class="card">
    <div class="card-header py-4">
        <span class="titulo_nivel_2">Avance por Macroprocesos</span>
    </div>

    <div class="card-body">
    {% if rol_id == 1 %}
        <div class="alert">
            <div class="row">
                <div class="col-md-5">
                    <label for="filtroIpress" class="form-label">
                        IPRESS
                    </label>
                    <select id="filtroIpress" class="form-select">
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button id="btnBuscar" class="btn btn-primary w-100">
                        Filtrar
                    </button>
                </div>
            </div>
        </div>
    {% endif %}
    <!-- SI EL ROL ES GAMCC RED e IPRESS -->
    {% if rol_id == 3 %}
        <div class="alert">
            <div class="row">
                <div class="col-md-5">
                    <label for="filtroRed" class="form-label">
                        Red
                    </label>
                    <select id="filtroRed" class="form-select">
                        <option value=""></option>
                    </select>
                </div>
                <div class="col-md-5">
                    <label for="filtroIpress" class="form-label">
                        IPRESS
                    </label>
                    <select id="filtroIpress" class="form-select">
                        <option value=""></option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button id="btnBuscar" class="btn btn-primary w-100">
                        Buscar
                    </button>
                </div>
            </div>
        </div>
    {% endif %}
        <div id="grafico_macroproceso" style="width:100%; height:950px;"></div>
    </div>
</div>

{% endblock %}
