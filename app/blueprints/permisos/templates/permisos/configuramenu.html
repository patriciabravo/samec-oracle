{% extends "layout.html" %}

{% block content %}
<div class="card">
  <div class="card-header card-subtitle-header py-6">
        Lista de Menus por Rol
  </div>
  <div class="card-body">
    <table id="permisosTable" class="table table-striped table-bordered gy-5 gs-7 ">
                <thead>
                    <tr>
                        <th>Id Rol</th>
                        <th>Nombre del Rol</th>
                        <th>Opciones Menu</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
    </table>
  </div>
</div>

<div class="modal fade" id="AsignarOpcionRol" tabindex="-1" aria-labelledby="AsignarOpcionRol" >
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
    <form id="form_asignar_opcion_rol" class="form" action="" method="POST">    
      <!-- HEADER -->
      <div class="modal-header">
        <h5 class="modal-title" id="editarModalLabel">Asignar Opciones a Rol</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <!-- BODY -->
      <div class="modal-body">
        <input type="hidden" name="id_rol" id="id_rol" value="">
          <div class="row g-4 p-2">
            <div class="col-md-12 fv-row">
              <label for="username" class="form-label">Nombre del Rol</label>
              <input type="text" class="form-control form-control-sm" id="nombre_rol" name="nombre_rol">
            </div>            
          </div>          
          <div class="row g-4 p-2">
            <div class="col-md-12 fv-row">
              <label for="opciones_rol" class="form-label">Opciones para el Rol</label>
              <select class="form-select form-select-sm" id="sel_opciones" name="sel_opciones[]" multiple>
                <option value="">Seleccione Opciones</option>
              </select>
            </div>
          </div>           
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-back-gris" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" id="btn_guarda_opciones"  class="btn btn-back-azul">Guardar</button>
      </div>
    </form>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('permisos.static', filename='js/permisos/general.js') }}"></script>
<script>
    BandejaPermisosEvent.init();
</script>
{% endblock %}
